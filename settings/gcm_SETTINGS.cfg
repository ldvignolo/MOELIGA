#========================
# PARAMETROS DE EJECUCION
#========================


# ARCHIVOS DE ENTRENAMIENTO Y PRUEBA
# 
# >> RECORDAR SETEAR "Ngenes" DE ACUERDO AL DATASET <<
# 


trnfile="data/GCM_Training.arff"
tstfile="data/GCM_Test.arff"

# NUMERO DE GENES EN EL CROMOSOMA
Ngenes=16063

WriteYamlFile=True

#======================

# DIRECTORIO ARCHIVOS DE SALIDA

outdir="./resultados_GCM/"



# CANTIDAD DE PROCESADORES
NProcesos=14


# EJECUTABLE PARA CALCULO DEL FITNESS
cmd="./bin/fitness"

# EJECUTABLE PARA EL TeST
testbin="./bin/test"

#======================
# CLASSIFIERS
#======================

classifier="DT"
test_classifier="ADA,DT,RF,SVM,MLP,RBF"

#======================
# CLASSIFIER PARAMETERS
#======================

classifier_ADA_config="50 100 1e-3"
classifier_DT_config="0 0 100"
classifier_RF_config="20 1 1e-7 0"
classifier_SVM_config="0.01 1e-3 100 10 1e-5 0 0.1"
classifier_MLP_config="0 0 30 10 0.03 1e-5 1"
classifier_RBF_config="10 1.0 38 38 0.03 1e-5 1"

# AdaBoost: perceptron train epochs / iterations / tolerance     
# DecisionTree: minimum leaf size / minimum gain split / maximum depth     
# RandomForest: number of Trees / minimum Leaf Size / minimum Gain Split / maximum Depth 
# SVM: L2-regularization constant / Margin of difference between classes / pSGD Max iterations / pSGD datapoints per thread / pSGD Maximum absolute tolerance / pSGD shuffle / pSGD decay policy step size 
# MLP: layer 1 units / layer 2 units / SGD epochs / SGD batch size / SGD training speed / SGD tolerance / SGD shuffle       
# layer units:  0 -> (attribs + classes)/2; (-1) -> (attribs + classes)
# RBF: number of centroids / betas: value to be used with centres / SGD epochs / SGD batch size / SGD training speed / SGD tolerance / SGD shuffle    


Normalizar=True
Estandarizar=False
DataShuffle=True
NTests=1
validationSize=0.3




#======================
# FUNCIONES OBJETIVO
#======================

# NUMERO DE OBJETIVOS
NObjetivos=3
# 1er Obj -> Classif UAR
# 2do Obj -> # features
# 3er Obj -> Relief Measure

# Aplicar sigmoida en la 2da Func Obj
Obj2Sigmod=True
SigmLambda=1.2
SigmGamma=0.0



#======================
# PARAMETROS GENERALES
#======================


# NUMERO MAXIMO DE GENERACIONES
Gmax=500
# Gmax=2

# PROBABILIDAD DE CRUZA
px=0.90


# TeST solo sobre el mejor del frente
onlyBest=True
# Funcion para elegir un cromo para TeST
Rfun=2
# 1: (menor distancia al punto (1,1) de fintess
# 2: cociente UAR/Nfeats

# Aplicar operador de variacion 
# a los individuos repetidos
ModifyRepeated=True


#======================
# FUNCION DE FITNESS
#======================
# Options
# 1: Rank based Sharing (MOGA)
# 2: Mean-Rank-Distance based Sharing 
# 3: Cluster based Sharing
FitnessOption=3
# Escalar por cant indiv en el rango
FitnessNRScale=False


#======================
# MUTACION
#======================

# PROBABILIDAD DE MUTACION
pm=0.15
# pm=0.2


# MUTACION CON DECAIMIENTO (si falso usa pm)
Exponencial=False
# Exponencial=False
# Multiplicadores de 1/L:
GammaINI=0.25
GammaFIN=0.06

# Funcion Amortiguada
Amortiguada=False
amA=0.35
amF=5.0
amPhi=3.14


#===================
# CRITERIOS DE CORTE
#===================

# FITNESS DESEADO
fitmax=0.9999

# GENERACIONES SIN MEJORAS (porcentaje de Gmax)
steady=100
# =100 -> disabled

#===================
# POBLACION GENERAL
#===================

# NUMERO DE INDIVIDUOS
Nindividuos=90


# NUMERO DE INDIVIDUOS ELITE
# En MOGA se hace un muestreo de los individuos del frente actual,
# por lo tanto deberia ser un numero razonablemente mayor que 1
E=10

# BRECHA GENERACIONAL
# cantidad de invididuos
# Brecha=0
Brecha=10

# METODO DE SELECCION
# [1-Ruleta - 2-Torneo - 3-Ventana]
# OpSeleccion=2
OpSeleccion=1

# METODO DE MUTACION
# [1-de cromosoma - 2-de bit]
OpMutacion=2

# ---------------------------------------------------
# Tasa de activacion de genes en la poblacion inicial
# ---------------------------------------------------

TasaActivacionInicial=0.03
TasaActivacionSubPob=0.5

# ----------------------
# para poblacion general
TasaActivacionEscalonada=True
# para el 55% de la pob
TasaActivacion55=0.03
# para el 30% de la pob
TasaActivacion30=0.15
# para el 15% de la pob
TasaActivacion15=0.35


#===================
# FITNESS SHARING
#===================

# Niche Size (neighborhood size)
SigmaShare=0.04 
AlfaShare=1.0 
# SigmaShare=0.05 
# AlfaShare=1.0
# mayor AlfaShare va a hacer que mas indiv entren en la vecindad 
# Dist 0: genotype space / Dist 1: objective space.
dist_opt=0

#===================
# SUBPOBLACIONES
#===================

# NUMERO DE SUBPOBLACIONES
# NSubPoblaciones=1
NSubPoblaciones=3

# NUMERO DE INDIVIDUOS
Nindividuos_s=50

# NUMERO MAXIMO DE GENERACIONES
Gmax_s=70

# GENERACIONES GENERALES DE ESPERA ENTRE SUBPOBLACIONES
SPobWait=5

# TIPO DE REEMPLAZO DESDE SUBPOS HACIA POBL GENERAL
SubPob_Replace_Type="reemplazo_completo"
# SubPob_Replace_Type="reemplazo_padre"
# SubPob_Replace_Type="reemplazo_seleccion"

# Si falso no uso clasificador para evaluar en SubPob
# SP_Classifier_Evaluation=False
SP_Classifier_Evaluation=True

#===================
# Sin implementar
#===================

# NUMERO DE PADRES
# Np2x=200
# NUMERO DE HIJOS
# H=300



#================== FIN CONFIGS ==================#
